# Netlify config — serves the static frontend in public/ and proxies
# /api/* to the backend (Render/Railway) so the browser stays same-origin
# (cookies work, no CORS). Replace the destination host with YOUR backend URL.
[build]
  publish = "public"
  command = ""

[[redirects]]
  from = "/api/*"
  to = "https://REPLACE-WITH-YOUR-BACKEND.onrender.com/api/:splat"
  status = 200
  force = true
